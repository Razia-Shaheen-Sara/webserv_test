<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Webserv</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f4ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 48px 64px;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      }
      h1 {
        font-size: 2.2rem;
        margin-bottom: 8px;
        color: #1F3864;
      }
      .names {
        font-size: 1.2rem;
        color: #2E75B6;
        font-weight: bold;
        margin-bottom: 24px;
      }
      .badge {
        display: inline-block;
        background: #e8f0fe;
        color: #1F3864;
        border-radius: 20px;
        padding: 6px 16px;
        margin: 4px;
        font-size: 0.9rem;
      }
      .status {
        margin-top: 24px;
        color: #27ae60;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello from Webserv! 🚀</h1>
      <div class="names">Made by socketSquad Noor, Sara & Natalia</div>
      <div>
        <span class="badge">Codam</span>
        <span class="badge">C++</span>
        <span class="badge">HTTP/1.1</span>
        <span class="badge">Non-blocking I/O</span>
      </div>
      <div class="status">✅ Server is running on port 8080</div>
    </div>
  </body>
</html>
